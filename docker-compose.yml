services:
  rtl-converter:
    build: .
    image: rtl-converter:latest
    container_name: rtl-converter
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # .env — LLM 서버 설정 (필수)
      - ./.env:/app/.env:ro
      # LLM 로그 저장 위치
      - ./logs:/app/logs
      # hooks 설정 (선택)
      - ./rtl-converter-hooks.js:/app/rtl-converter-hooks.js:ro
      # config 튜닝 (선택)
      - ./rtl-converter-config.js:/app/rtl-converter-config.js:ro
    environment:
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

